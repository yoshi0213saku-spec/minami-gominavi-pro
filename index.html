<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南相木村 ごみナビ Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f0fdf4;
            color: #1e293b;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="bg-gradient-to-br from-green-600 to-green-700 text-white pt-10 pb-16 px-6 rounded-b-[2.5rem] shadow-lg">
        <div class="max-w-md mx-auto text-center">
            <div class="inline-flex items-center justify-center bg-white/20 backdrop-blur-md p-3 rounded-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">南相木村 ごみナビ Pro</h1>
            <p class="text-green-100 text-sm mt-2 opacity-90 font-sans tracking-wide">ごみ収集カレンダー</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto px-5 -mt-10">
        
        <!-- Contact Support - Centered -->
        <div class="mb-4 p-4 bg-blue-50/95 backdrop-blur rounded-2xl border border-blue-100 text-sm shadow-sm fade-in text-center">
            <div class="flex items-center justify-center mb-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                </svg>
                <span class="font-bold text-blue-800 text-[10px] uppercase tracking-wider font-sans">Contact Support</span>
            </div>
            <p class="text-blue-700 leading-relaxed font-medium text-xs">
                不明な点は、南相木村 役場住民課へ：<br>
                <a href="tel:0267781050" class="text-lg font-bold underline decoration-blue-300 tracking-wider">0267-78-1050</a>
            </p>
        </div>

        <!-- Documents Section -->
        <div class="mb-8 space-y-3 fade-in">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1 font-sans">Documents & Links</p>
            <div class="grid grid-cols-1 gap-3">
                <!-- PDF Link Updated to gomi-wakekta202604.pdf -->
                <a href="gomi-wakekta202604.pdf" target="_blank" class="flex items-center p-4 bg-white rounded-2xl shadow-sm border border-gray-100 active:scale-95 transition-transform">
                    <div class="bg-red-50 p-3 rounded-xl mr-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <div>
                        <span class="block font-bold text-gray-700 text-sm font-sans">ごみ分別一覧表 (PDF)</span>
                        <span class="text-[10px] text-gray-400 font-medium italic text-xs">全品目の分別ルールを確認</span>
                    </div>
                </a>
            </div>
        </div>

        <!-- Calendar Section -->
        <section id="calendarSection" class="mb-10 pt-4">
            <div class="flex items-center justify-between mb-4 px-2">
                <h2 class="text-lg font-bold text-gray-800 flex items-center tracking-tighter">
                    <span class="mr-2">📅</span>令和8年度 収集カレンダー
                </h2>
                <span class="text-[10px] text-gray-400 font-bold bg-white px-2 py-1 rounded-md border border-gray-100">2026-2027</span>
            </div>

            <!-- Legend Card -->
            <div class="bg-white rounded-2xl p-4 mb-4 shadow-sm border border-gray-100 grid grid-cols-2 gap-2 text-[11px]">
                <div class="flex items-center bg-gray-50 p-2 rounded-lg font-bold"><b class="text-blue-600 mr-2">(不)</b> 不燃ごみ(第1火)</div>
                <div class="flex items-center bg-gray-50 p-2 rounded-lg font-bold"><b class="text-amber-700 mr-2">(古)</b> 古紙類(第1水)</div>
                <div class="flex items-center bg-gray-50 p-2 rounded-lg font-bold"><b class="text-pink-500 mr-2">(プ)</b> プラ類(第2・4水)</div>
                <div class="flex items-center bg-gray-50 p-2 rounded-lg font-bold"><b class="text-green-600 mr-2">(缶)</b> 缶・びん(第3水)</div>
                <div class="flex items-center bg-gray-50 p-2 rounded-lg font-bold text-yellow-700"><span class="mr-2">⚠️</span> 有害ごみ(役場へ)</div>
                <div class="flex items-center bg-gray-50 p-2 rounded-lg font-bold text-purple-700"><span class="mr-2">📦</span> 粗大ごみ(年2回)</div>
            </div>

            <!-- Monthly Cards Container -->
            <div class="grid grid-cols-1 gap-4" id="calendarContainer">
                <!-- Calendar data will be injected here -->
            </div>
        </section>

        <footer class="text-center mt-12 text-gray-400 text-[10px] pb-10 uppercase tracking-[0.2em]">
            &copy; 2025 Minamiaiki Village Office
        </footer>
    </main>

    <script>
        /**
         * 収集カレンダーデータ (令和8年度)
         */
        const calendarData = [
            { month: "4月", burnable: "6, 13, 20, 27", resources: "7(不), 1(古), 8(プ), 15(缶), 22(プ)" },
            { month: "5月", burnable: "4, 11, 18, 25", resources: "5(不), 6(古), 13(プ), 20(缶), 27(プ)" },
            { month: "6月", burnable: "1, 8, 15, 22, 29", resources: "2(不), 3(古), 10(プ), 17(缶), 24(プ)" },
            { month: "7月", burnable: "6, 13, 20, 27", resources: "7(不), 1(古), 8(プ), 15(缶), 22(プ)" },
            { month: "8月", burnable: "3, 10, 17, 24, 31", resources: "4(不), 5(古), 12(プ), 19(缶), 26(プ)" },
            { month: "9月", burnable: "7, 14, 21, 28", resources: "1(不), 2(古), 9(プ), 16(缶), 23(プ)" },
            { month: "10月", burnable: "5, 12, 19, 26", resources: "6(不), 7(古), 14(プ), 21(缶), 28(プ)" },
            { month: "11月", burnable: "2, 9, 16, 23, 30", resources: "3(不), 4(古), 11(プ), 18(缶), 25(プ)" },
            { month: "12月", burnable: "7, 14, 21, 28", resources: "1(不), 2(古), 9(プ), 16(缶), 23(プ)" },
            { month: "1月", burnable: "4, 11, 18, 25", resources: "5(不), 6(古), 13(プ), 20(缶), 27(プ)" },
            { month: "2月", burnable: "1, 8, 15, 22", resources: "2(不), 3(古), 10(プ), 17(缶), 24(プ)" },
            { month: "3月", burnable: "1, 8, 15, 22, 29", resources: "2(不), 3(古), 10(プ), 17(缶), 24(プ)" }
        ];

        const calendarContainer = document.getElementById('calendarContainer');

        // カレンダーの表示
        function displayCalendar() {
            calendarContainer.innerHTML = calendarData.map((data, index) => `
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-50 overflow-hidden relative">
                    <div class="flex items-center justify-between mb-3 border-b border-gray-50 pb-2">
                        <span class="text-xl font-bold text-green-700">${data.month}</span>
                        <span class="text-[10px] text-gray-300 tracking-widest font-bold font-sans">MONTHLY SCHEDULE</span>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-[11px] font-bold text-red-500 bg-red-50 px-2 py-0.5 rounded text-center">可燃 (月曜)</span>
                            <span class="text-sm text-gray-700 font-bold font-sans">${data.burnable}</span>
                        </div>
                        <div class="flex items-start justify-between">
                            <span class="text-[11px] font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded text-center mt-0.5 font-sans">資源 (火水)</span>
                            <span class="text-sm text-gray-700 font-bold font-sans text-right leading-relaxed flex-1 ml-4 tracking-tighter">${data.resources}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 起動時
        window.addEventListener('DOMContentLoaded', () => {
            displayCalendar();
        });
    </script>
</body>
</html>
